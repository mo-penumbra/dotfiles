# Prefix: Ctrl-a (shell "beginning-of-line" conflict — pass through with C-a C-a)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g default-shell "${SHELL}"

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,alacritty:Tc"

set -g mouse on
set -g escape-time 10
set -g history-limit 50000
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename off

# Splits keep current path; intuitive bindings
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane nav without prefix
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

bind c new-window -c "#{pane_current_path}"

bind r source-file ~/.tmux.conf \; display "reloaded"

# F12: mute outer tmux so keys pass through to a nested tmux (e.g. inside pig ssh).
# Press F12 again to restore. Status bar turns yellow while muted.
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=black,bg=yellow" \;\
  set window-status-current-style "fg=yellow,bg=black" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  set -u window-status-current-style \;\
  refresh-client -S

# Quiet
set -g visual-activity off
set -g visual-bell off
setw -g monitor-activity off

# Vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Status bar — minimal: bold session name on the left, windows flush right
set -g status-style "bg=default,fg=default"
set -g status-justify right
set -g status-left "#[bold] #S "
set -g status-left-length 20
set -g status-right ""
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "reverse,bold"

# Host-aware accent. Color separates service (red) from team (blue). Role
# is declared by the host at /etc/penumbra/host-role, set by the ansible
# service_host/team_host role, so this config stays VM-agnostic.
set -g status-position bottom
if-shell 'test "$(cat /etc/penumbra/host-role 2>/dev/null)" = service' 'set -g window-status-current-style "fg=white,bg=red,bold"'
if-shell 'test "$(cat /etc/penumbra/host-role 2>/dev/null)" = team'    'set -g window-status-current-style "fg=white,bg=blue,bold"'

# Plugins (TPM). Install with prefix+I, update with prefix+U.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Keep this at the very bottom.
run '~/.tmux/plugins/tpm/tpm'
