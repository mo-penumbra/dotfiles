# Prefix: Ctrl-a (shell "beginning-of-line" conflict — pass through with C-a C-a)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g default-shell "${SHELL}"

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,alacritty:Tc"

set -g mouse on
set -g escape-time 10
set -g history-limit 50000
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename off

# Splits keep current path; intuitive bindings
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane nav without prefix
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

bind c new-window -c "#{pane_current_path}"

bind r source-file ~/.tmux.conf \; display "reloaded"

# Quiet
set -g visual-activity off
set -g visual-bell off
setw -g monitor-activity off

# Vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Status bar — inherit terminal colors; use reverse/bold for emphasis
set -g status-style "bg=default,fg=default"
set -g status-left "#[bold] #S #[default]│ "
set -g status-left-length 30
set -g status-right "#[fg=yellow]%H:%M  %Y-%m-%d "
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "reverse,bold"

# Plugins (TPM). Install with prefix+I, update with prefix+U.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Keep this at the very bottom.
run '~/.tmux/plugins/tpm/tpm'
